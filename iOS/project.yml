name: WhisperMobile

options:
  bundleIdPrefix: com.aaryanpurohit
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  WhisperMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaryanpurohit.whisper-mobile
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_STYLE: Automatic
